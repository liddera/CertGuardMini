name: CertGuard Desktop Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        configuration: [Release]

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Install .NET 8.0
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore CertGuard.sln

    - name: Build
      run: dotnet build CertGuard.sln -c ${{ matrix.configuration }} --no-restore

    - name: Publish self-contained
      run: |
        dotnet publish src/CertGuard.Desktop/CertGuard.Desktop.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: CertGuardDesktop-win-x64
        path: ./publish/CertGuardDesktop.exe
        retention-days: 30
